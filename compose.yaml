name: tchitundo-hulo-preview

services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
    image: tchitundo-hulo-preview:latest
    container_name: tchitundo-hulo-preview
    restart: unless-stopped
    init: true
    ports:
      - "7788:7788"
    environment:
      BACKOFFICE_USERNAME: ${BACKOFFICE_USERNAME:-}
      BACKOFFICE_PASSWORD: ${BACKOFFICE_PASSWORD:-}
      BACKOFFICE_SESSION_SECRET: ${BACKOFFICE_SESSION_SECRET:-}
      BACKOFFICE_USERS_PATH: /app/data/users.json
      CONTENT_DATA_PATH: /app/data/content.json
      CONTENT_UPLOADS_DIR: /app/data/uploads
    volumes:
      - tchitundo_content:/app/data

volumes:
  tchitundo_content:
